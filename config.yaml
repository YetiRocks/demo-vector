name: "Vector Search Demo"
app_id: "demo-vector"
version: "1.0.0"
description: "Automatic text-to-vector embedding with HNSW nearest-neighbor semantic search"
enabled: true
rest: true
graphql: true

schemas:
  - schemas/vector.graphql

static_files:
  path: web
  route: /
  index: index.html
  notFound:
    file: index.html
    statusCode: 200
  build:
    sourceDir: source
    command: npm run build